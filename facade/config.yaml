name: "Facade"
description: "Two-tier AI pipeline that watches Home Assistant events and sends expressive face commands to a tamagotchi ESP32 via MQTT"
version: "1.0.0"
slug: "facade"
arch:
  - aarch64
  - amd64
homeassistant_api: true
services:
  - mqtt:need
options:
  anthropic_api_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "facade"
  mqtt_password: ""
  debounce_seconds: 30
  haiku_model: "claude-haiku-4-5-20251001"
  brain_model: "claude-sonnet-4-6-20250514"
  watched_domains:
    - binary_sensor
    - climate
    - cover
    - light
    - media_player
    - person
    - sensor
    - sun
    - zone
  watched_entities: []
  ignored_entities: []
  log_level: "info"
schema:
  anthropic_api_key: "password"
  mqtt_host: "str"
  mqtt_port: "int"
  mqtt_user: "str"
  mqtt_password: "password"
  debounce_seconds: "int"
  haiku_model: "str"
  brain_model: "str"
  watched_domains:
    - "str"
  watched_entities:
    - "str"
  ignored_entities:
    - "str"
  log_level: list(trace|debug|info|notice|warning|error|fatal)
startup: "application"
boot: "auto"
