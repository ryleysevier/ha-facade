name: "Facade"
description: "AI-powered facade pet that reacts to your smart home via MQTT"
version: "2.0.2"
slug: "facade"
url: "https://github.com/ryleysevier/ha-facade"
image: "ghcr.io/ryleysevier/ha-facade/{arch}"
arch:
  - aarch64
  - amd64
homeassistant_api: true
map:
  - type: homeassistant_config
    read_only: false
services:
  - mqtt:need
options:
  anthropic_api_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "facade"
  mqtt_password: ""
  mqtt_topic_prefix: "facade"
  pet_name: "Buddy"
  quiet_hours_start: "23:00"
  quiet_hours_end: "06:00"
  escalation_enabled: true
  escalation_budget_per_day: 10
  escalation_model: "claude-opus-4-20250514"
  need_decay_rates:
    hunger: 0.0015
    boredom: 0.0012
    loneliness: 0.0016
    energy: -0.0016
  log_level: "info"
schema:
  anthropic_api_key: "password"
  mqtt_host: "str"
  mqtt_port: "int"
  mqtt_user: "str"
  mqtt_password: "password"
  mqtt_topic_prefix: "str"
  pet_name: "str"
  quiet_hours_start: "str"
  quiet_hours_end: "str"
  escalation_enabled: "bool"
  escalation_budget_per_day: "int"
  escalation_model: "str"
  need_decay_rates:
    hunger: "float"
    boredom: "float"
    loneliness: "float"
    energy: "float"
  log_level: list(trace|debug|info|notice|warning|error|fatal)
ingress: true
ingress_port: 8099
panel_icon: "mdi:emoticon-outline"
panel_title: "Facade"
init: false
startup: "application"
boot: "auto"
