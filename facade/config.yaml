name: "Facade"
description: "AI-powered dweller pet that reacts to your smart home via MQTT"
version: "1.0.2"
slug: "facade"
image: "ghcr.io/ryleysevier/ha-facade/{arch}"
arch:
  - aarch64
  - amd64
homeassistant_api: true
services:
  - mqtt:need
options:
  anthropic_api_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "facade"
  mqtt_password: ""
  mqtt_topic_prefix: "dweller"
  pet_name: "Buddy"
  personality: "curious, empathetic, slightly dramatic"
  debounce_seconds: 30
  max_changes_per_hour: 12
  quiet_hours_start: "23:00"
  quiet_hours_end: "06:00"
  haiku_model: "claude-haiku-4-5-20251001"
  brain_model: "claude-sonnet-4-6-20250514"
  need_decay_rates:
    hunger: 0.014
    boredom: 0.055
    loneliness: 0.028
    energy: -0.008
  watched_domains:
    - binary_sensor
    - climate
    - cover
    - light
    - media_player
    - person
    - sensor
    - sun
    - zone
  watched_entities: []
  ignored_entities: []
  log_level: "info"
schema:
  anthropic_api_key: "password"
  mqtt_host: "str"
  mqtt_port: "int"
  mqtt_user: "str"
  mqtt_password: "password"
  mqtt_topic_prefix: "str"
  pet_name: "str"
  personality: "str"
  debounce_seconds: "int"
  max_changes_per_hour: "int"
  quiet_hours_start: "str"
  quiet_hours_end: "str"
  haiku_model: "str"
  brain_model: "str"
  need_decay_rates:
    hunger: "float"
    boredom: "float"
    loneliness: "float"
    energy: "float"
  watched_domains:
    - "str"
  watched_entities:
    - "str"
  ignored_entities:
    - "str"
  log_level: list(trace|debug|info|notice|warning|error|fatal)
init: false
startup: "application"
boot: "auto"
